dataRoot: ./data
listen: false
listenAddress:
  ipv4: 0.0.0.0
  ipv6: "[::]"
protocol:
  ipv4: true
  ipv6: false
dnsPreferIPv6: false
browserLaunch:
  enabled: true
  browser: default
  hostname: auto
  port: -1
  avoidLocalhost: false
port: 8000
heartbeatInterval: 0
enableKeepAlive: false
ssl:
  enabled: false
  certPath: ./certs/cert.pem
  keyPath: ./certs/privkey.pem
  keyPassphrase: ""
whitelistMode: true
enableForwardedWhitelist: true
whitelist:
  - ::1
  - 127.0.0.1
whitelistDockerHosts: true
basicAuthMode: false
basicAuthUser:
  username: user
  password: password
enableCorsProxy: false
cors:
  enabled: true
  origin:
    - "null"
  methods:
    - OPTIONS
  allowedHeaders: []
  exposedHeaders: []
  credentials: false
  maxAge: null
requestProxy:
  enabled: false
  url: socks5://username:password@example.com:1080
  bypass:
    - localhost
    - 127.0.0.1
enableUserAccounts: false
enableDiscreetLogin: false
perUserBasicAuth: false
sso:
  autheliaAuth: false
  authentikAuth: false
  trustedProxies:
    - ::1
    - 127.0.0.1
hostWhitelist:
  enabled: false
  scan: true
  hosts: []
privateAddressWhitelist:
  enabled: false
  allowUnresolvedHosts: false
  log:
    blockedRequests: true
    allowedRequests: false
  allowedRanges:
    - 127.0.0.0/8
    - ::1/128
sessionTimeout: -1
disableCsrfProtection: false
securityOverride: false
logging:
  enableAccessLog: true
  minLogLevel: 0
rateLimiting:
  preferRealIpHeader: false
  basicAuthMaxAttempts: 5
  accountsLoginMaxAttempts: 5
  accountsRecoverMaxAttempts: 5
forwardedHeaders:
  xRealIp: true
  xForwardedFor: true
  cfConnectingIp: false
backups:
  allowFullDataBackup: true
  common:
    numberOfBackups: 50
  chat:
    enabled: true
    checkIntegrity: true
    maxTotalBackups: -1
    throttleInterval: 10000
thumbnails:
  enabled: true
  format: jpg
  quality: 95
  dimensions:
    bg:
      - 160
      - 90
    avatar:
      - 96
      - 144
    persona:
      - 96
      - 144
performance:
  lazyLoadCharacters: false
  memoryCacheCapacity: 100mb
  useDiskCache: true
  requestCompression:
    enabled: false
    minPayloadSize: 256kb
    maxPayloadSize: 8mb
    timeout: 4000
cacheBuster:
  enabled: false
  userAgentPattern: ""
allowKeysExposure: false
skipContentCheck: false
whitelistImportDomains:
  - localhost
  - cdn.discordapp.com
  - files.catbox.moe
  - raw.githubusercontent.com
requestOverrides: []
extensions:
  enabled: true
  autoUpdate: true
  models:
    autoDownload: true
    classification: Cohee/distilbert-base-uncased-go-emotions-onnx
    captioning: Xenova/vit-gpt2-image-captioning
    embedding: Cohee/jina-embeddings-v2-base-en
    speechToText: Xenova/whisper-small
    textToSpeech: Xenova/speecht5_tts
git:
  backend: auto
enableDownloadableTokenizers: true
promptPlaceholder: "[Start a new chat]"
openai:
  randomizeUserId: false
  captionSystemPrompt: ""
deepl:
  formality: default
mistral:
  enablePrefix: false
ollama:
  keepAlive: -1
  batchSize: -1
claude:
  enableSystemPromptCache: false
  cachingAtDepth: -1
  extendedTTL: false
  enableAdaptiveThinking: false
gemini:
  apiVersion: v1beta
  thoughtSignatures: true
  enableSystemPromptCache: false
  image:
    personGeneration: allow_adult
enableServerPlugins: false
enableServerPluginsAutoUpdate: true
